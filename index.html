<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO -->
    <title>Avishek Rimal (Abhishek) | Frontend Developer & UI/UX Specialist</title>
    <meta name="description" content="Portfolio of Avishek Rimal (commonly known as Abhishek Rimal). A professional Frontend Developer specializing in React, TypeScript, and high-performance web experiences." />
    <meta name="author" content="Avishek Rimal" />
    <meta name="keywords" content="Avishek Rimal, Abhishek Rimal, Frontend Developer, React Developer, Web Developer Nepal, TypeScript, Portfolio" />
    <link rel="canonical" href="https://yourdomain.com/" /> <!-- Replace with your real URL later -->

    <!-- Open Graph / Facebook (Visual sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="Avishek Rimal (Abhishek) - Frontend Developer Portfolio" />
    <meta property="og:description" content="Explore the projects and skills of Avishek Rimal, a specialist in building modern, responsive web applications." />
    <meta property="og:image" content="/og-image.png" /> <!-- Put a screenshot of your site in public folder as og-image.png -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Avishek Rimal (Abhishek) - Frontend Developer" />
    <meta property="twitter:description" content="Frontend Developer specializing in React and modern web technologies." />

    <!-- Google Person Schema (This tells Google who you ARE) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Avishek Rimal",
        "alternateName": "Abhishek Rimal",
        "url": "https://yourdomain.com",
        "jobTitle": "Frontend Developer",
        "knowsAbout": ["React", "TypeScript", "Web Development", "UI/UX Design"],
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourusername"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
